<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채팅</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    max-width: 640px; margin: 0 auto; padding: 16px;
    background: #f5f5f7;
  }
  h2 { margin: 8px 0 16px; }
  .card {
    background: #fff; border-radius: 12px; padding: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  #setup input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
  #setup button { width: 100%; margin-top: 10px; padding: 12px; border: 0; border-radius: 8px; background: #111; color: #fff; font-size: 16px; cursor: pointer; }
  #share { font-size: 13px; color: #555; padding: 8px 12px; background: #f0f0f4; border-radius: 8px; word-break: break-all; margin-bottom: 10px; }
  #share button { margin-left: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #fff; }
  #messages { height: 60vh; overflow-y: auto; padding: 8px; background: #fafafa; border-radius: 8px; }
  .msg { margin: 6px 0; padding: 6px 10px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
  .msg.me { background: #2d7cf0; color: #fff; margin-left: auto; }
  .msg.other { background: #e8e8ed; color: #111; }
  .msg.sys { background: transparent; color: #888; font-size: 12px; text-align: center; max-width: 100%; }
  .msg .name { display: block; font-size: 11px; opacity: .8; margin-bottom: 2px; }
  #input-row { display: flex; gap: 8px; margin-top: 10px; }
  #input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
  #send { padding: 10px 20px; border: 0; border-radius: 8px; background: #2d7cf0; color: #fff; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<h2>채팅 (테스트)</h2>

<div id="setup" class="card">
  <p>닉네임을 입력하고 입장하세요.<br><small style="color:#888">같은 링크를 가진 사람끼리만 대화할 수 있어요.</small></p>
  <input id="nickname" type="text" placeholder="닉네임" maxlength="20">
  <button id="enter-btn">입장</button>
</div>

<div id="chat" class="card" style="display:none">
  <div id="share">
    <strong>공유 링크:</strong> <span id="link"></span>
    <button id="copy-btn">복사</button>
  </div>
  <div id="messages"></div>
  <div id="input-row">
    <input id="input" type="text" placeholder="메시지 입력..." maxlength="500">
    <button id="send">전송</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0'

const SUPABASE_URL = 'https://duclnvlwvzhwhhglaxwr.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_wLKHYM62ImdgoT4EvasMag_ikSGtKTO'

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// URL 해시(#abc123)에서 방 ID 가져오기, 없으면 생성
let roomId = location.hash.slice(1)
if (!roomId) {
  roomId = Math.random().toString(36).slice(2, 10)
  location.hash = roomId
}

const $ = (id) => document.getElementById(id)
let nickname = ''
let channel = null

$('enter-btn').addEventListener('click', enterRoom)
$('nickname').addEventListener('keypress', (e) => { if (e.key === 'Enter') enterRoom() })
$('send').addEventListener('click', sendMsg)
$('input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg() })
$('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(location.href)
  $('copy-btn').textContent = '복사됨'
  setTimeout(() => { $('copy-btn').textContent = '복사' }, 1500)
})

function enterRoom() {
  const name = $('nickname').value.trim()
  if (!name) { alert('닉네임을 입력하세요'); return }
  nickname = name

  $('setup').style.display = 'none'
  $('chat').style.display = 'block'
  $('link').textContent = location.href

  channel = supabase.channel(`room-${roomId}`, {
    config: { broadcast: { self: false } }
  })

  channel
    .on('broadcast', { event: 'msg' }, ({ payload }) => {
      addMsg(payload.name, payload.text, 'other')
    })
    .on('broadcast', { event: 'join' }, ({ payload }) => {
      addMsg(null, `${payload.name}님이 입장했습니다`, 'sys')
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        addMsg(null, `채팅방 입장 (방 ID: ${roomId})`, 'sys')
        channel.send({ type: 'broadcast', event: 'join', payload: { name: nickname } })
      }
    })
}

function sendMsg() {
  const input = $('input')
  const text = input.value.trim()
  if (!text || !channel) return
  channel.send({
    type: 'broadcast',
    event: 'msg',
    payload: { name: nickname, text }
  })
  addMsg(nickname, text, 'me')
  input.value = ''
}

function addMsg(name, text, type) {
  const div = document.createElement('div')
  div.className = `msg ${type}`
  if (type === 'sys') {
    div.textContent = text
  } else {
    if (type === 'other' && name) {
      const n = document.createElement('span')
      n.className = 'name'
      n.textContent = name
      div.appendChild(n)
    }
    div.appendChild(document.createTextNode(text))
  }
  const messages = $('messages')
  messages.appendChild(div)
  messages.scrollTop = messages.scrollHeight
}
</script>
</body>
</html>
